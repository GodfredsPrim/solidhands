services:
  - type: web
    name: solidhands
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: COMPANY_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
    disk:
      name: uploads-data
      mountPath: /uploads
      sizeGB: 1
